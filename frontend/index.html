<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PawMatch — Pet Adoption Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.min.css">
  <style>
    :root {
      --pm-teal: #0d9488;
      --pm-teal-dark: #0f766e;
    }
    .hero-gradient {
      background: linear-gradient(135deg, var(--pm-teal) 0%, #134e4a 100%);
    }
    .nav-link.active { font-weight: 600; color: var(--pm-teal) !important; }
    .card-pet img { height: 180px; object-fit: cover; }
    .stat-pill { font-size: 0.85rem; }
    .brand-paw { color: var(--pm-teal); }
  </style>
</head>
<body class="bg-light">
  <div id="app"></div>
  <div id="modal-root"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
